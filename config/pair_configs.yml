# 每个 pair 的配置，ema_alpha 为其中一个 key，后续可扩展更多 key
# 未列出的 pair 使用 default 中的配置
# thr_bid_bps/thr_ask_bps: s_bps 下单闸门阈值(bps)，每日从本文件重载
# s_bps/depth5 汇总分位数(0~100)，bid/ask 各自独立，按 pair 读取
# fp_momentum_scale: FP 动量缩放，0=关闭；>0 时用 fp_mid 的 bar 间变化平移 bid/ask（forex/digital 实盘）
default:
  ema_alpha: 1.0
  thr_bid_bps: 0.0
  thr_ask_bps: 0.0
  s_bps_summary_percentile_bid: 50.0
  s_bps_summary_percentile_ask: 50.0
  depth5_summary_percentile_bid: 50.0
  depth5_summary_percentile_ask: 50.0
  wp_invalid_ticks: 0
  fp_momentum_scale: 0.0

